<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#c2410c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c2d12" stop-opacity="0.05"/>
    </radialGradient>

    <radialGradient id="v" cx="50%" cy="50%" r="52%">
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>

    <clipPath id="sphereClip">
      <circle cx="500" cy="500" r="460"/>
    </clipPath>
  </defs>

  <rect width="100%" height="100%" fill="none"/>
  <g clip-path="url(#sphereClip)">
    <circle cx="500" cy="500" r="460" fill="none"/>

    <!-- Latitude lines -->
    <g fill="none" stroke="#f97316" stroke-opacity="0.55" stroke-width="4">
      <ellipse cx="500" cy="500" rx="430" ry="360"/>
      <ellipse cx="500" cy="500" rx="430" ry="270"/>
      <ellipse cx="500" cy="500" rx="430" ry="180"/>
      <ellipse cx="500" cy="500" rx="430" ry="90"/>
    </g>

    <!-- Longitude lines -->
    <g fill="none" stroke="#f97316" stroke-opacity="0.55" stroke-width="4">
      <ellipse cx="500" cy="500" rx="200" ry="440"/>
      <g transform="rotate(30 500 500)"><ellipse cx="500" cy="500" rx="200" ry="440"/></g>
      <g transform="rotate(60 500 500)"><ellipse cx="500" cy="500" rx="200" ry="440"/></g>
      <g transform="rotate(90 500 500)"><ellipse cx="500" cy="500" rx="200" ry="440"/></g>
      <g transform="rotate(120 500 500)"><ellipse cx="500" cy="500" rx="200" ry="440"/></g>
      <g transform="rotate(150 500 500)"><ellipse cx="500" cy="500" rx="200" ry="440"/></g>
    </g>

    <circle cx="500" cy="500" r="460" fill="url(#v)"/>
  </g>
</svg>
